# ──────────────────────────────────────────────────────────────────────────────
# FusionCameraDataService  —  docker-compose.yml
# Push-mode: gateway captures cameras and pushes to NestJS endpoints.
# No consumer-facing HTTP server is exposed from this container.
# ──────────────────────────────────────────────────────────────────────────────
#
# Usage:
#   cp .env.example .env
#   nano .env   # set DEVICE_ID and PUSH_TARGETS at minimum
#   docker compose up --build
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  fusioncamera:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: fusioncameradataservice:latest

    container_name: fusioncamera-${DEVICE_ID:-dev-node}

    restart: unless-stopped

    # ── Environment ────────────────────────────────────────────────────────
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Push configuration — override in .env or here
      - PUSH_TARGETS=${PUSH_TARGETS}          # required: e.g. http://nest1:3000
      - PUSH_FPS=${PUSH_FPS:-15}
      - PUSH_PATH=${PUSH_PATH:-/socket.io}
      - PUSH_NAMESPACE=${PUSH_NAMESPACE:-/camera}
      - PUSH_SECRET=${PUSH_SECRET:-}
      - PUSH_RECONNECT_DELAY=${PUSH_RECONNECT_DELAY:-5.0}
      # Camera selection — leave empty to auto-scan
      - CAMERA_INDICES=${CAMERA_INDICES:-}
      # Health server port (internal only — no consumer traffic)
      - HEALTH_PORT=${HEALTH_PORT:-9090}

    # ── Ports ──────────────────────────────────────────────────────────────
    # Only the health probe port is exposed; NestJS servers receive pushes
    # so no inbound video traffic enters this container.
    ports:
      - "${HEALTH_PORT:-9090}:9090"

    # ── USB camera device access ───────────────────────────────────────────
    devices:
      - /dev/video0:/dev/video0
      # Uncomment additional cameras as needed:
      # - /dev/video1:/dev/video1
      # - /dev/video2:/dev/video2

    # ── Security ──────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true

    # ── Health ────────────────────────────────────────────────────────────
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:9090/health', timeout=4)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Logging ────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
