# ──────────────────────────────────────────────────────────────────────────────
# FusionCameraDataService  —  docker-compose.yml
# Local development & single-host testing
# ──────────────────────────────────────────────────────────────────────────────
#
# Usage:
#   # Copy and edit the env file first
#   cp .env.example .env
#   nano .env        (set DEVICE_ID at minimum)
#
#   # Build and start
#   docker compose up --build
#
#   # Test the stream in a browser (accept the self-signed cert warning):
#   https://localhost:5443/api/v1/<YOUR_DEVICE_ID>/cameras
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  fusioncamera:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: fusioncameradataservice:latest

    container_name: fusioncamera-${DEVICE_ID:-dev-node}

    restart: unless-stopped

    # ── Environment ────────────────────────────────────────────────────────
    env_file:
      - .env          # created from .env.example by the operator
    environment:
      # These override anything in .env to ensure sane container defaults
      - HOST=0.0.0.0
      - PORT=5443
      - SSL_ENABLED=${SSL_ENABLED:-true}
      - SSL_SELF_SIGNED=${SSL_SELF_SIGNED:-true}
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    # ── Ports ──────────────────────────────────────────────────────────────
    ports:
      - "${PORT:-5443}:5443"

    # ── Volumes ────────────────────────────────────────────────────────────
    volumes:
      # Persist generated SSL certs between restarts
      - certs_data:/app/certs

    # ── USB camera device access ───────────────────────────────────────────
    # Mount all /dev/video* devices.  The 'video' group inside the container
    # matches GID 44 so no root privileges are needed.
    #
    # Option A — privileged (easiest, less secure; fine for dev):
    # privileged: true
    #
    # Option B — explicit device list (production-preferred):
    devices:
      - /dev/video0:/dev/video0
      # Uncomment additional cameras as needed:
      # - /dev/video1:/dev/video1
      # - /dev/video2:/dev/video2

    # ── Security ──────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true

    # ── Health ────────────────────────────────────────────────────────────
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          urllib.request.urlopen('https://localhost:5443/health', context=ctx, timeout=4)
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Logging ────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  certs_data:
    driver: local
