# ──────────────────────────────────────────────────────────────────────────────
# FusionCameraDataService  —  K3s / Kubernetes DaemonSet Deployment
# ──────────────────────────────────────────────────────────────────────────────
#
# Architecture
# ────────────
# This service is deployed as a DaemonSet so Kubernetes automatically runs
# exactly ONE pod per node — matching the "every machine has its own instance"
# requirement.
#
# DEVICE_ID is populated from the node's name (spec.nodeName).  Rename nodes
# to match your digital-twin IDs before deploying, e.g.:
#
#   kubectl label node <nodename> fusion.camera/role=gateway
#   kubectl annotate node <nodename> fusion.camera/device-id=twin-factory-01
#
# Then set the correct value in the ConfigMap below or override per-node.
#
# Quick start
# ───────────
# 1. Push your image:
#      docker build -t <registry>/fusioncameradataservice:latest .
#      docker push <registry>/fusioncameradataservice:latest
#
# 2. Create TLS secret (optional — leave empty to use auto-generated certs):
#      kubectl -n fusioncamera create secret tls fusion-tls \
#        --cert=path/to/cert.pem --key=path/to/key.pem
#
# 3. Apply this manifest:
#      kubectl apply -f k3s-deployment.yaml
#
# 4. Access the service on any node at https://<nodeIP>:5443
# ──────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Namespace
metadata:
  name: fusioncamera
  labels:
    app.kubernetes.io/name: fusioncamera

---
# ── ConfigMap: non-sensitive configuration ─────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: fusioncamera-config
  namespace: fusioncamera
data:
  PORT:                  "5443"
  HOST:                  "0.0.0.0"
  SSL_ENABLED:           "true"
  SSL_SELF_SIGNED:       "true"
  SSL_CERT_PATH:         "/app/certs/cert.pem"
  SSL_KEY_PATH:          "/app/certs/key.pem"
  SSL_CERT_DAYS:         "3650"
  STREAM_WIDTH:          "1280"
  STREAM_HEIGHT:         "720"
  STREAM_FPS:            "30"
  STREAM_JPEG_QUALITY:   "85"
  MAX_CAMERAS:           "10"
  CAMERA_RECONNECT_DELAY: "2.0"
  LOG_LEVEL:             "INFO"
  DEBUG:                 "false"

---
# ── DaemonSet: one pod per gateway node ───────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fusioncamera
  namespace: fusioncamera
  labels:
    app.kubernetes.io/name: fusioncamera
    app.kubernetes.io/component: camera-stream
spec:
  selector:
    matchLabels:
      app: fusioncamera

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: fusioncamera
        app.kubernetes.io/name: fusioncamera
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: "placeholder-updated-by-helm-or-kustomize"

    spec:
      # ── Pull policy ─────────────────────────────────────────────────────
      serviceAccountName: default

      # ── Tolerations: run on ALL nodes including control-plane ──────────
      tolerations:
        - operator: Exists

      # ── Host network: bind directly to the node's NIC ─────────────────
      # Change to false and use a Service/NodePort if you want isolation.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # ── Init container: ensure /dev/video* is accessible ──────────────
      initContainers:
        - name: check-video-devices
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Checking for USB video devices..."
              found=0
              for i in $(seq 0 9); do
                if [ -e /dev/video$i ]; then
                  echo "  Found /dev/video$i"
                  found=$((found+1))
                fi
              done
              if [ $found -eq 0 ]; then
                echo "WARNING: No /dev/video* devices found on this node."
                echo "         The service will start and serve NO SIGNAL frames."
              else
                echo "Found $found camera device(s)."
              fi
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev
              mountPath: /dev

      # ── Main container ─────────────────────────────────────────────────
      containers:
        - name: fusioncamera
          # Replace with your actual registry/image
          image: your-registry/fusioncameradataservice:latest
          imagePullPolicy: Always

          # ── Environment ─────────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: fusioncamera-config

          env:
            # DEVICE_ID = this node's name (rename nodes to match digital-twin IDs)
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DEVICE_ID
              value: "$(NODE_NAME)"

          # ── Ports ────────────────────────────────────────────────────────
          ports:
            - name: https
              containerPort: 5443
              hostPort: 5443        # exposed on the node IP directly
              protocol: TCP

          # ── Volume mounts ────────────────────────────────────────────────
          volumeMounts:
            # Host /dev directory so all video devices are available
            - name: dev
              mountPath: /dev
            # Persistent certificate directory (survives pod restarts)
            - name: certs
              mountPath: /app/certs

          # ── Security context ─────────────────────────────────────────────
          securityContext:
            # privileged is required for USB device access on most kernels.
            # Replace with a specific device-list approach for hardened nodes.
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0        # Must be root OR a user in the 'video' group

          # ── Resource limits (tune per your hardware) ─────────────────────
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import urllib.request, ssl
                  ctx = ssl.create_default_context()
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE
                  urllib.request.urlopen('https://localhost:5443/health', context=ctx, timeout=4)
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 6
            failureThreshold: 3

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import urllib.request, ssl
                  ctx = ssl.create_default_context()
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE
                  urllib.request.urlopen('https://localhost:5443/ready', context=ctx, timeout=4)
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      # ── Volumes ──────────────────────────────────────────────────────────
      volumes:
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: certs
          # emptyDir persists for the lifetime of the pod.
          # Use a hostPath or PVC if you want certs to survive pod restarts.
          emptyDir: {}

      # ── Termination ──────────────────────────────────────────────────────
      terminationGracePeriodSeconds: 15

---
# ── Service: NodePort (redundant when hostNetwork=true, kept for reference) ──
apiVersion: v1
kind: Service
metadata:
  name: fusioncamera
  namespace: fusioncamera
  labels:
    app.kubernetes.io/name: fusioncamera
spec:
  type: NodePort
  selector:
    app: fusioncamera
  ports:
    - name: https
      protocol: TCP
      port: 5443
      targetPort: 5443
      nodePort: 30443    # Access via https://<any-node-IP>:30443

---
# ── RBAC: minimal ServiceAccount (no cluster permissions needed) ─────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusioncamera
  namespace: fusioncamera
  labels:
    app.kubernetes.io/name: fusioncamera
